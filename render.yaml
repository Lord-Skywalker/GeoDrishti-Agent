# =============================================================================
# Render Blueprint Configuration for GeoDrishti Backend
# =============================================================================
services:
  - type: web
    name: geodrishti-backend
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      python backend/manage.py migrate
    startCommand: gunicorn --bind 0.0.0.0:$PORT --chdir backend bhoomi_api.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: GEMINI_API_KEY
        sync: false
        description: "Your Gemini API Key from Google AI Studio"
      - key: GEE_CREDENTIALS_BASE64
        sync: false
        description: "The base64 encoded string of your Google Earth Engine service account JSON key"
      - key: DJANGO_SECRET_KEY
        generateValue: true
        description: "Secret key for Django application security"
      - key: DEBUG
        value: "False"
        description: "Turn off Django debugging in production"
      - key: ALLOWED_HOSTS
        value: "geodrishti-backend.onrender.com"
        description: "Comma-separated list of additional allowed hosts"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-vercel-frontend.vercel.app"
        description: "Comma-separated list of CORS allowed origins (like your Vercel frontend URL)"
